<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Chai aur JavaScript</h1>
    <button id="start">Start</button>
    <button id="stop">Stop</button>
</body>
<script>
    // setInterval(function(){
    //     console.log("Kriti", Date.now());
    // }, 1000)

    const sayDate = function(str){
        console.log(str, Date.now())
    }

    // const harshit = setInterval(sayDate, 1000, "hi")

    // const kriti = clearInterval(harshit)

    let intervalId=null

    const st=document.querySelector('#start')
    st.addEventListener('click', (e)=>{
        if(!intervalId){
       intervalId= setInterval(sayDate, 1000, "Hello")
        }
    })

    const sp=document.querySelector('#stop')
    sp.addEventListener('click', (e)=>{
        clearInterval(intervalId)
        intervalId=null
    })
</script>
</html>
